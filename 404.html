<html>
    <head>
    <script type="text/javascript" src="code.js" defer></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="preload" as="style" href="https://fonts.googleapis.com/css2?family=Montserrat:ital,wght@0,100..900;1,100..900&display=swap" onload="this.rel='stylesheet'">
    <link rel="stylesheet" href="style.css" type="text/css">

    <meta charset="utf-8">
    <meta name="Dino Zvonar">
    <title>Dino Zvonar</title>
    <style type="text/css">
    </style>

    </head>

    <body>
        <header style="text-align: center;">

            <div id="nav"></div>

            <script>
                fetch('../navbar.html')
                .then(response => response.text())
                .then(data => {
                document.getElementById('nav').innerHTML = data;
                
                const homeTab = document.getElementById("GAMES");
                if (homeTab) {
                    homeTab.classList.remove("disabled");
                }

                });
            </script>
            
        </header>
        
        <div class="main-content" style="text-align: center;">
            <div style="height: 20vh;"></div>
            <h3>404<br>Page not Found</h3>
            <div style="height: 20vh;"></div>


        <div id="foot"></div>

        <script>
                fetch('footer.html')
                .then(response => response.text())
                .then(data => {
                document.getElementById('foot').innerHTML = data;
                });
        </script>

    </div>

    </body>


    
</html>
